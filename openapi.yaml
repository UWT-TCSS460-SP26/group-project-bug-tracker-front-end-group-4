  /issues:
    get:
      tags: [Issues]
      summary: List Issues (Admin)
      description: |
        Returns a paginated, filterable, sortable list of issues that have not been deleted.

        **Authentication:** Requires a valid Auth² JWT with role Admin or above.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
          description: 1-based page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of issues per page.
        - name: status
          in: query
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/IssueStatus'
              - type: array
                items:
                  $ref: '#/components/schemas/IssueStatus'
          description: Filter by one or more status values (e.g. `?status=OPEN` or `?status=OPEN&status=IN_PROGRESS`).
          explode: true
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [createdAt, status, title]
            default: createdAt
          description: Field to sort by.
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction.
      responses:
        '200':
          description: A paginated list of issues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueListResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (role below Admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Issues]
      summary: Create Issue
      description: Creates a new issue for reporting a problem or suggestion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body, contact]
              properties:
                title:
