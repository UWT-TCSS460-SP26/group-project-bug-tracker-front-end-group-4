openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Group 4
    **Deployed URL:** https://group-project-backend-group-4.onrender.com

    A RESTful API for a move and TV review community.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-project-backend-group-4.onrender.com
    description: Production deployment

tags:
  - name: General
    description: General-purpose routes
  - name: Movies
    description: Routes used with Movies
  - name: TV Shows
    description: Routes used with TV Shows
  - name: Reviews
    description: Routes used with persisted user reviews
  - name: Ratings
    description: Routes used with persisted user ratings
  - name: Issues
    description: Routes for reporting and tracking issues

paths:
  /heartbeat:
    get:
      tags: [General]
      summary: Heartbeat
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is alive and running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'
  /api/movies/{movie_id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: Provides details on the provided movie, based on it's provided id
      parameters:
        - name: movie_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB movie ID
      responses:
        '200':
          description: Successfully get back movie details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetail'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: movie_id doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing movies.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieListItem'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/movies/featured:
    get:
      tags: [Movies]
      summary: Featured Movies
      description: Returns featured movies based on community interactions, sorted by most-reviewed or top-rated. Items whose TMDB data is unavailable (404) are silently omitted from the response.
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [most-reviewed, top-rated]
            default: top-rated
          description: The sorting metric for featured movies.
      responses:
        '200':
          description: Successfully retrieved a list of featured movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeaturedMovie'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/movies/search:
    get:
      tags: [Movies]
      summary: Search Movies
      description: Search movies by title.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Search term for movie titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved movie search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Search results not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/tv/search:
    get:
      tags: [TV Shows]
      summary: Search TV Shows
      description: Search TV shows by title.
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Search term for TV show titles.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number for TMDB pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results returned in this response.
      responses:
        '200':
          description: Successfully retrieved TV search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Search results not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/tv/{series_id}:
    get:
      tags: [TV Shows]
      summary: TV Show Details
      description: Provides details on the provided TV Show, based on it's provided id
      parameters:
        - name: series_id
          in: path
          required: true
          schema:
            type: integer
          description: TMDB series ID
      responses:
        '200':
          description: Successfully get back TV details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TVShowDetail'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: series_id doesn't exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/tv/featured:
    get:
      tags: [TV Shows]
      summary: Featured TV Shows
      description: Returns featured TV shows based on community interactions, sorted by most-reviewed or top-rated. Items whose TMDB data is unavailable (404) are silently omitted from the response.
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [most-reviewed, top-rated]
            default: top-rated
          description: The sorting metric for featured TV shows.
      responses:
        '200':
          description: Successfully retrieved a list of featured TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeaturedTVShow'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/tv/popular:
    get:
      tags: [TV Shows]
      summary: Popular TV Shows
      description: Returns content sorted by popularity using the TMDB discover endpoint. Showcases widely appealing TV shows.
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
            default: 'en-US'
          description: ISO-639-1 language code (e.g., 'en-US')
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            default: 'desc'
            enum: ['desc', 'asc']
      responses:
        '200':
          description: Successfully retrieved a list of popular TV shows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TVShowListItem'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to reach TMDB API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reviews:
    get:
      tags: [Reviews]
      summary: List Reviews
      description: Returns paginated reviews with optional filters.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Number of reviews per page.
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by author user id.
        - name: mediaId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by persisted media id.
        - name: tmdbId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Filter by TMDB id. Must be provided with `type`.
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [MOVIE, TV_SHOW]
          description: Media type for `tmdbId` filter. Must be provided with `tmdbId`.
      responses:
        '200':
          description: Reviews retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Reviews]
      summary: Create Review
      description: Creates a review for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tmdbId, type, body]
              properties:
                tmdbId:
                  type: integer
                  minimum: 1
                type:
                  type: string
                  enum: [MOVIE, TV_SHOW]
                title:
                  type: string
                body:
                  type: string
      responses:
        '201':
          description: Review created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already reviewed this media.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reviews/me:
    get:
      tags: [Reviews]
      summary: Get My Reviews
      description: Returns a paginated list of the authenticated user's reviews, ordered by most recent.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Number of reviews per page.
      responses:
        '200':
          description: Successfully retrieved personal reviews.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get Review By ID
      description: Returns one review by review identifier.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Review retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewWithRelations'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Reviews]
      summary: Update Review
      description: Updates a review. Only the review owner can modify their own review.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                body:
                  type: string
      responses:
        '200':
          description: Review updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not allowed to modify this review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Reviews]
      summary: Delete Review
      description: Deletes a review. The authenticated user must be the review owner, or have the Admin role or above (Admin, SuperAdmin, Owner).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '204':
          description: Review deleted successfully. No content returned.
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not allowed to delete this review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ratings:
    get:
      tags: [Ratings]
      summary: List Ratings
      description: Retrieve a paginated list of ratings. Filterable by user, media, or TMDB ID and type.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: mediaId
          in: query
          required: false
          schema:
            type: integer
        - name: tmdbId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by TMDB id. Must be provided with `type`.
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [MOVIE, TV_SHOW]
          description: Media type for `tmdbId` filter. Must be provided with `tmdbId`.
      responses:
        '200':
          description: A paginated list of ratings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingListResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Ratings]
      summary: Create Rating
      description: Submit a new rating. If the media doesn't exist, it will be resolved and created automatically.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tmdbId, type, score]
              properties:
                tmdbId:
                  type: integer
                  example: 550
                type:
                  type: string
                  enum: [MOVIE, TV_SHOW]
                  example: MOVIE
                score:
                  type: integer
                  example: 5
                  minimum: 1
                  maximum: 5
      responses:
        '201':
          description: Rating successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - User has already rated this specific media
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ratings/me:
    get:
      tags: [Ratings]
      summary: Get My Ratings
      description: Returns a paginated list of the authenticated user's ratings, ordered by most recent.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Successfully retrieved personal ratings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingListResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ratings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The primary key of the rating
    get:
      tags: [Ratings]
      summary: Get Rating by ID
      responses:
        '200':
          description: Successfully retrieved the rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingWithRelations'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Ratings]
      summary: Update Rating
      description: Updates a rating. Only the rating owner can modify their own rating.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
      responses:
        '200':
          description: Rating updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to modify this record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Ratings]
      summary: Delete Rating
      description: Deletes a rating. Only the rating owner can delete their own rating.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Rating deleted successfully
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to modify this record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
