        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /issues/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The ID of the issue.
    get:
      tags: [Issues]
      summary: Get Issue by ID (Admin)
      description: |
        Returns a single issue by its ID.

        **Authentication:** Requires a valid Auth² JWT with role Admin or above.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Issue retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSingleResponse'
        '400':
          description: Invalid ID parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (role below Admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Issue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Issues]
      summary: Patch Issue (Admin)
      description: |
        Partially updates an existing issue. Only the fields present in the
        request body are changed — omitted fields are left untouched (PATCH
        merge semantics). An empty body is a no-op (200).

        **Authentication:** Requires a valid Auth² JWT with role Admin or above.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: 'Corrected title'
                body:
                  type: string
                  example: 'Updated description'
                contact:
                  type: string
                  example: 'new-contact@example.com'
                status:
                  $ref: '#/components/schemas/IssueStatus'
            examples:
              triage:
                summary: Triage — move to in-progress
                value:
                  status: IN_PROGRESS
              resolve:
                summary: Mark as resolved
                value:
                  status: RESOLVED
              editDetails:
                summary: Fix a typo
                value:
                  title: 'Corrected title'
                  body: 'Updated description'
      responses:
        '200':
          description: Issue updated (or no-op for empty body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuePatchResponse'
        '400':
          description: Validation failed (e.g. unknown status string).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (role below Admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Issue not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Issues]
      summary: Delete Issue (Admin)
      description: |
        Soft-deletes an issue (sets `deleted=true`). The row is preserved for
        audit purposes but excluded from all list/detail responses.

        **Authentication:** Requires a valid Auth² JWT with role Admin or above.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Issue soft-deleted. The response includes the deleted issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDeleteResponse'
        '400':
          description: Invalid ID parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions (role below Admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Issue not found or already deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
